name: Catalog integrity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: catalog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install catalog tooling
        run: python -m pip install '.[dev]'

      - name: Lint and check formatting
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate skills, profiles, catalog, risk baseline, and README
        run: skills-collection check

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download and verify Gitleaks 8.30.1
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/gitleaks"
          gh release download v8.30.1 \
            --repo gitleaks/gitleaks \
            --pattern 'gitleaks_8.30.1_linux_x64.tar.gz' \
            --pattern 'gitleaks_8.30.1_checksums.txt' \
            --dir "$RUNNER_TEMP/gitleaks"
          cd "$RUNNER_TEMP/gitleaks"
          grep 'gitleaks_8.30.1_linux_x64.tar.gz' gitleaks_8.30.1_checksums.txt | sha256sum -c -
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz

      - name: Reject new secrets
        run: |
          "$RUNNER_TEMP/gitleaks/gitleaks" dir . \
            --no-banner \
            --redact \
            --gitleaks-ignore-path .gitleaksignore
