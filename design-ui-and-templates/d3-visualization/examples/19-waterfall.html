<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D3 Waterfall Chart — snow-d3 example 19</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; padding: 24px; }
    h1 { font-size: 1.3rem; margin-bottom: 6px; color: #222; }
    p.desc { font-size: 0.85rem; color: #666; margin-bottom: 20px; text-align: center; }
    #chart { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .axis text { font-size: 11px; fill: #555; }
    .axis .domain { stroke: #ddd; }
    .grid .tick line { stroke: #f0f0f0; }
    .grid .domain { display: none; }
    .bar-pos { fill: #22c55e; }
    .bar-neg { fill: #ef4444; }
    .bar-total { fill: #3b82f6; }
    .connector { stroke: #bbb; stroke-dasharray: 4,3; fill: none; }
    .bar-label { font-size: 11px; fill: #444; text-anchor: middle; }
    .value-label { font-size: 11px; font-weight: 600; text-anchor: middle; }
    .controls { margin-bottom: 12px; display: flex; gap: 10px; }
    button { padding: 5px 14px; border: 1px solid #bbb; border-radius: 4px; background: white; cursor: pointer; font-size: 13px; }
    button:hover { background: #eee; }
  </style>
</head>
<body>
<h1>D3 Waterfall / Bridge Chart</h1>
<p class="desc">Running cumulative total with positive (green) and negative (red) increments. Total columns in blue. Uses <code>scaleBand</code>, <code>scaleLinear</code>, computed baselines.</p>
<div class="controls">
  <button id="btn-resample">Randomize</button>
  <button id="btn-toggle">Toggle Labels</button>
</div>
<div id="chart"></div>

<script type="module">
import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

// ── Data ──────────────────────────────────────────────────────────────────
function makeData() {
  const items = [
    { label: "Revenue",       value: Math.round(Math.random() * 200 + 800), type: "total" },
    { label: "COGS",          value: -(Math.round(Math.random() * 100 + 250)) },
    { label: "Gross Profit",  value: null, type: "subtotal" },
    { label: "S&M",           value: -(Math.round(Math.random() * 50 + 80)) },
    { label: "R&D",           value: -(Math.round(Math.random() * 40 + 70)) },
    { label: "G&A",           value: -(Math.round(Math.random() * 30 + 40)) },
    { label: "Op. Income",    value: null, type: "subtotal" },
    { label: "Interest",      value: -(Math.round(Math.random() * 20 + 15)) },
    { label: "Tax",           value: -(Math.round(Math.random() * 30 + 20)) },
    { label: "Net Income",    value: null, type: "total" },
  ];

  let running = 0;
  return items.map(d => {
    if (d.type === "total" || d.type === "subtotal") {
      const base = 0;
      const total = running;
      return { ...d, value: total, base: 0, total: true };
    }
    const base = running;
    running += d.value;
    return { ...d, base, end: running, total: false };
  });
}

// ── Layout ────────────────────────────────────────────────────────────────
const width = 760, height = 420;
const margin = { top: 30, right: 20, bottom: 60, left: 70 };
const innerW = width  - margin.left - margin.right;
const innerH = height - margin.top  - margin.bottom;

const svg = d3.select("#chart").append("svg")
  .attr("width", width).attr("height", height)
  .attr("viewBox",`0 0 ${width} ${height}`)
  .style("max-width","100%").style("height","auto");
const g = svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

let showLabels = true;

function render() {
  g.selectAll("*").remove();

  const data = makeData();
  const labels = data.map(d => d.label);

  const xScale = d3.scaleBand().domain(labels).range([0, innerW]).padding(0.3);
  const allVals = data.flatMap(d => [d.base ?? 0, d.value, d.end ?? d.value]).filter(v => v !== undefined);
  const yMin = Math.min(0, d3.min(allVals));
  const yMax = d3.max(allVals);
  const yScale = d3.scaleLinear().domain([yMin, yMax * 1.12]).nice().range([innerH, 0]);

  // Grid
  g.append("g").attr("class","axis grid")
    .call(d3.axisLeft(yScale).ticks(6).tickSize(-innerW).tickFormat(""))
    .call(a => a.select(".domain").remove())
    .call(a => a.selectAll(".tick line").attr("stroke","#f0f0f0"));

  // Zero line
  g.append("line").attr("stroke","#aaa").attr("stroke-width",1)
    .attr("x1",0).attr("x2",innerW)
    .attr("y1",yScale(0)).attr("y2",yScale(0));

  // Axes
  g.append("g").attr("class","axis x-axis")
    .attr("transform",`translate(0,${innerH})`)
    .call(d3.axisBottom(xScale))
    .selectAll("text").attr("transform","rotate(-25)").style("text-anchor","end");
  g.append("g").attr("class","axis y-axis")
    .call(d3.axisLeft(yScale).ticks(6)
      .tickFormat(d => `${d >= 0 ? "+" : ""}${d3.format(",.0f")(d)}`));

  // Y-axis title
  svg.append("text").attr("transform","rotate(-90)")
    .attr("x", -(margin.top + innerH/2)).attr("y",14)
    .attr("text-anchor","middle").style("font-size","11px").style("fill","#888").text("USD (000s)");

  // Connector lines
  data.forEach((d, i) => {
    if (d.total || i === 0) return;
    const next = data[i + 1];
    if (!next) return;
    const x1 = xScale(d.label) + xScale.bandwidth();
    const x2 = xScale(next.label);
    const y  = yScale(d.end ?? d.value);
    g.append("path").attr("class","connector")
      .attr("d",`M${x1},${y} H${x2}`);
  });

  // Bars
  data.forEach(d => {
    const x    = xScale(d.label);
    const bw   = xScale.bandwidth();
    const lo   = d.total ? 0 : Math.min(d.base, d.end);
    const hi   = d.total ? d.value : Math.max(d.base, d.end);
    const barH = Math.abs(yScale(lo) - yScale(hi));
    const barY = yScale(hi);

    let cls = "bar-pos";
    if (d.total) cls = "bar-total";
    else if ((d.end - d.base) < 0) cls = "bar-neg";

    g.append("rect").attr("class", cls)
      .attr("x",x).attr("width",bw)
      .attr("y",barY).attr("height",barH)
      .attr("rx",2);

    if (showLabels) {
      const labelY = barY - 5;
      g.append("text").attr("class","value-label")
        .attr("x", x + bw/2).attr("y", labelY)
        .style("fill", d.total ? "#1d4ed8" : ((d.end - d.base) < 0 ? "#b91c1c" : "#15803d"))
        .text(d3.format("+,d")(d.total ? d.value : (d.end - d.base)));
    }
  });
}

d3.select("#btn-resample").on("click", render);
d3.select("#btn-toggle").on("click", () => { showLabels = !showLabels; render(); });

render();
</script>
</body>
</html>
